<!DOCTYPE html> 
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Todo Card</title>
        <link rel="stylesheet" href="todo.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    </head>
    <body>
        <article data-testid="test-todo-card">
            
            <div class="card-header">
                <div class="checkbox-block">
                    <input type="checkbox" aria-label="Mark task as complete" data-testid="test-todo-complete-checkbox" id="todo-toggle">

                    <label for="todo-toggle" class="sr-only">Mark complete</label>
                </div>

                
                <div class="title-block">
                    <h3 data-testid="test-todo-title" class="todo-title">Build your HNG stage 0 task</h3>

                   
                    <div class="badges">
                        <span data-testid="test-todo-priority" class="priority-badge" aria-label="Priority: High">High</span>
                        
                        <span data-testid="test-todo-status" class="status-badge" aria-label="Status: In Progress">In Progress</span>
                    </div>
                </div>
            </div>

            <p data-testid="test-todo-description" class="description">Make a clean, modern Todo / Task Card component, with exact data-testid elements and ensure it is screenreader accessible and mobile-friendly</p>

            <div class="date-row">
                <span class="icon"><i class="fas fa-calendar" aria-hidden="true"></i></span>

                <time data-testid="test-todo-due-date" datetime="2026-04-16T23:59:00Z">Due April 16th, 2026
                </time>

                <time data-testid="test-todo-time-remaining" aria-live="polite" class="time-remaining"></time>
            </div>

            <hr class="divider">

            <div class="tags">
                <span class="tag-label">TAGS</span>
               <ul role="list" data-testid="test-todo-tags" class="tag-list">
                        <li data-testid="test-todo-tag-work" class="tag-badge" aria-label="Tag: Work">Work</li>

                        <li data-testid="test-todo-tag-urgent" class="tag-badge" aria-label="Tag: Urgent">Urgent</li>

                        <li data-testid="test-todo-tag-design" class="tag-badge" aria-label="Tag: Design">Design</li>
                    </ul>
            </div>
            
            <div class="action-buttons" role="group" aria-label="Task actions">
                <button data-testid="test-todo-edit-button" aria-label="Edit task"><i class="fa fa-pencil" aria-hidden="true" onclick="console.log('Edit clicked')"></i>Edit</button>

                <button data-testid="test-todo-delete-button" aria-label="Delete task" onclick="alert('Delete this task?')" class="delete-button"><i class="fa fa-trash" aria-hidden="true"></i>Delete</button>
            </div>
        </article>

        <script src="script.js"></script>
    </body>
</html>
